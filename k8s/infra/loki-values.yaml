# Loki Helm values for CivPulse k3s cluster (SingleBinary mode)
# Chart: grafana/loki
# Resource budget: ~1 GB RAM, 0.25 core (Loki portion of log stack budget)
#
# Install:
#   helm repo add grafana https://grafana.github.io/helm-charts
#   helm repo update
#   helm install loki grafana/loki \
#     --namespace civpulse-infra \
#     --values k8s/infra/loki-values.yaml

loki:
  auth_enabled: false  # single-tenant, no multi-tenant auth needed
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  limits_config:
    retention_period: 720h  # 30 days
    allow_structured_metadata: true
    volume_enabled: true
  storage:
    type: filesystem

# Disable minio — using local filesystem storage
minio:
  enabled: false

deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 30Gi
    storageClass: local-path
  resources:
    requests:
      memory: "512Mi"
      cpu: "125m"
    limits:
      memory: "1Gi"
      cpu: "250m"

# Zero out replica counts of other deployment modes
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomCompactor:
  replicas: 0
bloomGateway:
  replicas: 0

# Disable built-in monitoring (we use VictoriaMetrics)
monitoring:
  selfMonitoring:
    enabled: false
  lokiCanary:
    enabled: false

# Disable the chart's bundled gateway (Traefik handles routing)
gateway:
  enabled: false

# Disable bundled test pod
test:
  enabled: false

# Disable chunksCache and resultsCache for single-node simplicity
chunksCache:
  enabled: false
resultsCache:
  enabled: false
