# Dozzle IngressRoute — Tailscale-only access via MagicDNS hostname
# Accessible at http://thor.tailb56d83.ts.net/dozzle (not public via Cloudflare)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: dozzle
  namespace: civpulse-infra
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`thor.tailb56d83.ts.net`) && PathPrefix(`/dozzle`)
      kind: Rule
      services:
        - name: dozzle
          port: 8080