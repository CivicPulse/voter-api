# Grafana IngressRoute — Tailscale-only access via MagicDNS hostname
# Set your hostname in tailscale-hostname.env (see tailscale-hostname.env.example)
# Replace TAILSCALE_HOSTNAME below with your node's MagicDNS hostname
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: civpulse-infra
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`TAILSCALE_HOSTNAME`) && PathPrefix(`/grafana`)
      kind: Rule
      services:
        - name: grafana
          port: 80
