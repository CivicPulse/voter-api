services:
  db:
    image: postgis/postgis:15-3.4
    shm_size: 256m
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: voter_api
      POSTGRES_USER: voter_api
      POSTGRES_PASSWORD: voter_api_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U voter_api
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      ELECTION_REFRESH_ENABLED: "false"
    command: ["--reload"]
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
      - ./exports:/app/exports

volumes:
  pgdata:
